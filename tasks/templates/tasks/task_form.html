{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h3>Task Form</h3>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {% for field in form %}

                    <div class="mb-3">

                        <label class="form-label">

                            {{ field.label }}

                        </label>

                        {{ field }}

                        {% if field.errors %}

                            <div class="text-danger">

                                {{ field.errors }}

                            </div>

                        {% endif %}

                    </div>

                {% endfor %}

                <button class="btn btn-primary">

                    Save

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
