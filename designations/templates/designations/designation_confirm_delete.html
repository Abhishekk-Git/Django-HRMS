{% extends "base.html" %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h4>

            Are you sure you want to delete

            <strong>{{ object.name }}</strong>?

        </h4>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">

                Delete

            </button>

            <a
                href="{% url 'department_list' %}"
                class="btn btn-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
